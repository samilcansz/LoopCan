<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTA Önizleme — Neural Ağ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1f4e;
    --navy-dark: #080f28;
    --font-display: 'Instrument Serif', serif;
    --font-body: 'Inter', sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: #f5f6f8;
    overflow: hidden;
  }

  /* ── Section shell ── */
  .cta-section {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #f5f6f8;
  }

  /* ── Canvas ── */
  #neural-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── Radial vignette — keeps edges light so text pops ── */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(245,246,248,0.8) 100%);
    pointer-events: none;
    z-index: 1;
  }
  /* Bottom fade */
  .vignette-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 180px;
    background: linear-gradient(to top, #f5f6f8, transparent);
    pointer-events: none;
    z-index: 1;
  }

  /* ── CTA content ── */
  .cta-inner {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 4rem 2rem;
    max-width: 680px;
  }

  .section-tag {
    display: inline-flex; align-items: center;
    background: rgba(13,31,78,0.07);
    color: var(--navy);
    border: 1px solid rgba(13,31,78,0.15);
    padding: 0.28rem 0.9rem; border-radius: 9999px;
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 1.4rem;
  }

  .cta-h {
    font-family: var(--font-display);
    font-size: clamp(2rem, 3.5vw, 3.6rem);
    color: var(--navy);
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin: 0 auto 1.25rem;
  }
  .cta-h em {
    font-style: italic;
    color: var(--navy);
  }

  .cta-sub {
    font-size: clamp(0.95rem, 1vw, 1.1rem);
    color: rgba(13,31,78,0.55);
    line-height: 1.8;
    max-width: 520px;
    margin: 0 auto 2.25rem;
    font-weight: 300;
  }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--navy); color: white;
    padding: 0.85rem 2rem; border-radius: 9999px;
    font-size: 0.9rem; font-weight: 700;
    border: none; cursor: pointer; text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(13,31,78,0.25);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(13,31,78,0.35);
  }
  .btn-primary svg { width: 16px; height: 16px; stroke: white; stroke-width: 2.5; fill: none; }

  /* Preview badge */
  .preview-badge {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px); border-radius: 9999px;
    padding: 8px 20px; font-size: 0.72rem; color: rgba(255,255,255,0.35);
    z-index: 100; white-space: nowrap;
  }
</style>
</head>
<body>

<section class="cta-section">

  <canvas id="neural-canvas"></canvas>
  <div class="vignette"></div>
  <div class="vignette-bottom"></div>

  <div class="cta-inner">
    <h2 class="cta-h">
      Ekibinizin nerede<br>zaman kaybettiğini <em>birlikte bulalım</em>
    </h2>
    <p class="cta-sub">
      15 dakikalık kısa bir görüşmede sizi tanıyalım, hangi süreçlerin sizi yavaşlattığını görelim ve size özel bir otomasyon planı çıkaralım. Taahhüt yok, baskı yok.
    </p>
    <a href="mailto:info@loopcan.online?subject=Tan%C4%B1%C5%9Fma%20Toplant%C4%B1s%C4%B1" class="btn-primary">
      Ücretsiz Analiz Al
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>

</section>

<div class="preview-badge">Önizleme — fareyi hareket ettir</div>

<script>
const canvas = document.getElementById('neural-canvas');
const ctx = canvas.getContext('2d');

const mouse = { x: -9999, y: -9999 };
let nodes = [];
let pulses = []; // signal pulses traveling along edges
let W, H;

const NODE_COUNT     = 72;
const CONNECT_DIST   = 145;
const ATTRACT_DIST   = 200;
const ATTRACT_STR    = 0.028;
const PULSE_INTERVAL = 1800; // ms between random signal pulses

/* ── Node class ── */
class Node {
  constructor() {
    this.reset();
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
  }

  reset() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.35;
    this.vy = (Math.random() - 0.5) * 0.35;
    this.r  = Math.random() < 0.12 ? 3.2 : Math.random() < 0.3 ? 2 : 1.4;
    this.isHub   = this.r > 3;
    this.baseFade = 0.25 + Math.random() * 0.45;
    this.opacity  = this.baseFade;
    this.phase    = Math.random() * Math.PI * 2;
  }

  update() {
    // Mouse attraction
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const d  = Math.hypot(dx, dy);
    if (d < ATTRACT_DIST && d > 1) {
      const f = (1 - d / ATTRACT_DIST) * ATTRACT_STR;
      this.vx += (dx / d) * f;
      this.vy += (dy / d) * f;
    }

    // Damping
    this.vx *= 0.985;
    this.vy *= 0.985;
    this.x  += this.vx;
    this.y  += this.vy;

    // Soft boundary — push back gently instead of hard bounce
    const margin = 40;
    if (this.x < margin)  this.vx += 0.05;
    if (this.x > W - margin) this.vx -= 0.05;
    if (this.y < margin)  this.vy += 0.05;
    if (this.y > H - margin) this.vy -= 0.05;

    // Opacity pulse
    this.phase += 0.018;
    this.opacity = this.baseFade + Math.sin(this.phase) * 0.08;

    // Extra brightness near mouse
    if (d < 120) this.opacity = Math.min(1, this.opacity + (1 - d / 120) * 0.45);
  }

  draw() {
    // Hub glow
    if (this.isHub) {
      const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 5);
      g.addColorStop(0, `rgba(13,31,78,${this.opacity * 0.18})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r * 5, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    }

    // Node dot
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(13,31,78,${this.opacity})`;
    ctx.fill();
  }
}

/* ── Pulse class — signal dot traveling along an edge ── */
class Pulse {
  constructor(a, b) {
    this.a  = a;  // source node
    this.b  = b;  // target node
    this.t  = 0;  // 0→1 progress
    this.speed = 0.012 + Math.random() * 0.01;
  }

  update() {
    this.t += this.speed;
    return this.t < 1;
  }

  draw() {
    const x = this.a.x + (this.b.x - this.a.x) * this.t;
    const y = this.a.y + (this.b.y - this.a.y) * this.t;
    const fade = Math.sin(this.t * Math.PI); // fade in/out

    // Glow
    const g = ctx.createRadialGradient(x, y, 0, x, y, 5);
    g.addColorStop(0, `rgba(13,31,78,${fade * 0.5})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    // Core dot
    ctx.beginPath();
    ctx.arc(x, y, 1.8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(13,31,78,${fade})`;
    ctx.fill();
  }
}

/* ── Draw connections ── */
function drawEdges() {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const d  = Math.hypot(dx, dy);
      if (d > CONNECT_DIST) continue;

      const base = (1 - d / CONNECT_DIST) * 0.22;

      // Boost if near mouse
      const mx = (nodes[i].x + nodes[j].x) / 2;
      const my = (nodes[i].y + nodes[j].y) / 2;
      const md = Math.hypot(mx - mouse.x, my - mouse.y);
      const boost = md < 160 ? (1 - md / 160) * 0.35 : 0;

      ctx.beginPath();
      ctx.moveTo(nodes[i].x, nodes[i].y);
      ctx.lineTo(nodes[j].x, nodes[j].y);
      ctx.strokeStyle = `rgba(13,31,78,${base + boost})`;
      ctx.lineWidth = 0.65;
      ctx.stroke();
    }
  }
}

/* ── Spawn random pulse ── */
function spawnPulse() {
  // Pick a random edge
  const a = nodes[Math.floor(Math.random() * nodes.length)];
  // Find a connected neighbour
  const candidates = nodes.filter(n => n !== a && Math.hypot(n.x - a.x, n.y - a.y) < CONNECT_DIST);
  if (candidates.length) {
    const b = candidates[Math.floor(Math.random() * candidates.length)];
    pulses.push(new Pulse(a, b));
  }
}

/* ── Resize ── */
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

/* ── Init ── */
function init() {
  resize();
  nodes = Array.from({ length: NODE_COUNT }, () => new Node());
}

/* ── Main loop ── */
let lastPulse = 0;
function loop(ts) {
  ctx.clearRect(0, 0, W, H);

  // Background — full clear (no fade trail needed here, CTA has content)
  ctx.fillStyle = '#f5f6f8';
  ctx.fillRect(0, 0, W, H);

  drawEdges();
  nodes.forEach(n => { n.update(); n.draw(); });

  // Pulses
  pulses = pulses.filter(p => p.update());
  pulses.forEach(p => p.draw());

  // Spawn new pulses
  if (ts - lastPulse > PULSE_INTERVAL) {
    spawnPulse();
    // Sometimes spawn a second one for busier feel
    if (Math.random() < 0.4) spawnPulse();
    lastPulse = ts;
  }

  requestAnimationFrame(loop);
}

/* ── Events ── */
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
window.addEventListener('mouseleave', () => {
  mouse.x = mouse.y = -9999;
});

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
